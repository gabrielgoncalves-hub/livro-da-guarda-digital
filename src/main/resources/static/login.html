<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Livro da Guarda Digital</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-slate-100 min-h-screen flex items-center justify-center p-4 bg-[url('https://www.transparenttextures.com/patterns/cubes.png')]">

    <div class="max-w-md w-full bg-white rounded-2xl shadow-2xl overflow-hidden border-t-8 border-[#1b3d1a]">
        <div class="p-8 text-center bg-slate-50 border-b border-slate-100 relative">
            <div class="w-16 h-16 bg-[#2d5a27] text-white rounded-full flex items-center justify-center mx-auto mb-4 shadow-lg border-4 border-white z-10 relative">
                <!-- Ícone de Escudo/Segurança -->
                <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"></path>
                </svg>
            </div>
            <h1 class="text-2xl font-black tracking-tight text-[#1b3d1a] uppercase">Sistema de Guarda</h1>
            <p class="text-xs font-bold text-[#2d5a27] uppercase tracking-widest mt-1">TG 02-009 • Bragança Paulista</p>
        </div>
        
        <div class="p-8">
            <!-- Script simples para mostrar mensagens de erro de senha ou logout -->
            <script>
                if (window.location.search.includes('error')) {
                    document.write('<div class="mb-5 bg-red-50 text-red-600 p-3 rounded-lg text-xs font-bold border border-red-200 text-center uppercase tracking-wide">Credenciais Inválidas. Acesso Negado.</div>');
                }
                if (window.location.search.includes('logout')) {
                    document.write('<div class="mb-5 bg-emerald-50 text-emerald-700 p-3 rounded-lg text-xs font-bold border border-emerald-200 text-center uppercase tracking-wide">Sessão encerrada com segurança.</div>');
                }
            </script>

            <form action="/login" method="POST" class="space-y-5">
                <div>
                    <label class="block text-[10px] uppercase tracking-wider text-slate-500 font-bold mb-1">Nome de Usuário</label>
                    <input type="text" name="username" required autocomplete="off" class="w-full bg-slate-50 border border-slate-300 rounded-lg p-3.5 text-sm text-slate-800 outline-none transition-all focus:ring-2 focus:ring-[#2d5a27]/30 focus:border-[#2d5a27] font-medium" placeholder="Ex: monitor">
                </div>
                <div>
                    <label class="block text-[10px] uppercase tracking-wider text-slate-500 font-bold mb-1">Senha de Acesso</label>
                    <input type="password" name="password" required class="w-full bg-slate-50 border border-slate-300 rounded-lg p-3.5 text-sm text-slate-800 outline-none transition-all focus:ring-2 focus:ring-[#2d5a27]/30 focus:border-[#2d5a27] font-medium" placeholder="••••••••">
                </div>
                
                <button type="submit" class="w-full bg-[#2d5a27] hover:bg-[#1b3d1a] text-white font-bold py-4 rounded-lg transition-all uppercase text-xs tracking-wider shadow-lg shadow-[#2d5a27]/30 mt-6">
                    Autenticar e Entrar
                </button>
            </form>
        </div>
        
        <div class="bg-slate-50 p-4 text-center border-t border-slate-100">
            <p class="text-[9px] text-slate-400 font-bold uppercase tracking-widest">Acesso Restrito • Exército Brasileiro</p>
        </div>
    </div>

</body>
</html>
